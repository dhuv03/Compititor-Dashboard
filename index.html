// ============================== INIT ==============================
function init(){
  buildNav();
  buildPages();
  navigate('overview');
  window.addEventListener('resize',debounce(()=>{const pg=document.querySelector('.pg.on');if(pg)renderChartsFor(pg.id.replace('pg-',''))},200));
}

function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms)}}

// ============================== NAV ==============================
function buildNav(){
  let h='';
  NAV.forEach(g=>{
    h+=`<div class="sb-gl">${g.g}</div>`;
    g.items.forEach(it=>{
      h+=`<a class="ni" data-page="${it.id}" onclick="navigate('${it.id}',this)"><div class="ic"><svg viewBox="0 0 24 24">${ICONS[it.icon]||ICONS.circle}</svg></div><span>${it.label}</span></a>`;
    });
  });
  document.getElementById('sbNav').innerHTML=h;
}

// ============================== BUILD PAGES ==============================
function buildPages(){
  const con=document.getElementById('pages');
  let h='';
  // Overview
  h+=`<div class="pg" id="pg-overview"></div>`;
  // Competitor pages
  D.comps.forEach(c=>{h+=`<div class="pg" id="pg-${c.id}"></div>`;});
  // Intel + Market
  h+=`<div class="pg" id="pg-intel"></div><div class="pg" id="pg-market"></div>`;
  con.innerHTML=h;
  renderOverview();
  D.comps.forEach(c=>renderComp(c));
  renderIntel();
  renderMarket();
}

// ============================== NAVIGATE ==============================
function navigate(pid,el){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  const pg=document.getElementById('pg-'+pid);
  if(pg){pg.classList.add('on');pg.style.animation='none';pg.offsetHeight;pg.style.animation='';}
  if(el)el.classList.add('on');
  else{const a=document.querySelector(`[data-page="${pid}"]`);if(a)a.classList.add('on');}
  const comp=D.comps.find(c=>c.id===pid);
  const titles={overview:'Competitive Overview',intel:'Intelligence Feed',market:'Market Context'};
  if(comp){
    document.getElementById('pgT').textContent=comp.name;
    document.getElementById('pgBc').innerHTML=`<a href="#" onclick="navigate('overview');return false">Dashboard</a> › Competitors › ${comp.name}`;
    document.getElementById('hdF').innerHTML=`<button class="btn btn-o" onclick="expComp('${comp.id}')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Export</button>`;
  }else{
    document.getElementById('pgT').textContent=titles[pid]||pid;
    document.getElementById('pgBc').innerHTML='';
    document.getElementById('hdF').innerHTML=pid==='overview'?`<div class="fp"><svg viewBox="0 0 24 24" width="13" height="13"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Last 12 Months</div><div class="fp"><svg viewBox="0 0 24 24" width="13" height="13"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> Gujarat</div><div class="fp"><svg viewBox="0 0 24 24" width="13" height="13"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg> All Segments</div>`:'';
  }
  closeMob();
  setTimeout(()=>renderChartsFor(pid),60);
}

function renderChartsFor(pid){
  if(pid==='overview'){rScatter();rVisLine();rDonut();}
  if(pid==='market')rPipeline();
  const comp=D.comps.find(c=>c.id===pid);
  if(comp){rFinChart(comp);rGauges(comp);}
}

// ============================== SVG HELPERS ==============================
function S(tag,a){const e=document.createElementNS('http://www.w3.org/2000/svg',tag);for(const[k,v]of Object.entries(a||{}))e.setAttribute(k,v);return e}
function gc(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim()}

// ============================== SCATTER CHART ==============================
function rScatter(){
  const c=document.getElementById('chScatter');if(!c)return;c.innerHTML='';
  const W=c.clientWidth,H=280,P={t:24,r:24,b:44,l:54},cw=W-P.l-P.r,ch=H-P.t-P.b;
  const svg=S('svg',{viewBox:`0 0 ${W} ${H}`,width:W,height:H});
  const tc=gc('--text3')||'#9CA3AF',grc=gc('--bdr')||'#E5E7EB';
  for(let i=0;i<=4;i++){const y=P.t+(ch/4)*i;svg.appendChild(S('line',{x1:P.l,y1:y,x2:W-P.r,y2:y,stroke:grc,'stroke-dasharray':'4,4'}));const t=S('text',{x:P.l-6,y:y+3,'text-anchor':'end','font-size':'9.5',fill:tc,'font-family':'Inter'});t.textContent=Math.round(100-(100/4)*i);svg.appendChild(t);}
  [0,100,200,300,400,500].forEach(g=>{const x=P.l+((g+50)/550)*cw;if(x<P.l||x>W-P.r)return;const t=S('text',{x,y:H-8,'text-anchor':'middle','font-size':'9.5',fill:tc,'font-family':'Inter'});t.textContent=g+'%';svg.appendChild(t);});
  const xL=S('text',{x:W/2,y:H,'text-anchor':'middle','font-size':'9.5',fill:tc,'font-family':'Inter','font-weight':'600'});xL.textContent='Growth Rate →';svg.appendChild(xL);
  const tp=document.createElement('div');tp.className='tp';c.appendChild(tp);
  D.comps.forEach(co=>{
    const gC=Math.max(-50,Math.min(500,co.growth));
    const x=P.l+((gC+50)/550)*cw,y=P.t+((100-co.sent)/100)*ch,r=Math.max(12,Math.sqrt(co.share)*5);
    const ci=S('circle',{cx:x,cy:y,r,fill:co.color,opacity:.75,cursor:'pointer'});
    ci.addEventListener('mouseenter',()=>{ci.setAttribute('opacity','1');ci.setAttribute('r',r+3);tp.innerHTML=`<strong>${co.short}</strong><br>Growth: ${co.growth>0?'+':''}${co.growth}%<br>Sentiment: ${co.sent}<br>Share: ${co.share}%`;tp.classList.add('vis');});
    ci.addEventListener('mousemove',e=>{const r2=c.getBoundingClientRect();tp.style.left=(e.clientX-r2.left+12)+'px';tp.style.top=(e.clientY-r2.top-40)+'px';});
    ci.addEventListener('mouseleave',()=>{ci.setAttribute('opacity','.75');ci.setAttribute('r',r);tp.classList.remove('vis');});
    ci.addEventListener('click',()=>navigate(co.id));
    svg.appendChild(ci);
    const lb=S('text',{x,y:y-r-5,'text-anchor':'middle','font-size':'9.5',fill:co.color,'font-family':'Inter','font-weight':'600','pointer-events':'none'});lb.textContent=co.short;svg.appendChild(lb);
  });
  c.insertBefore(svg,tp);
}

  const tc=gc('--text3')||'#9CA3AF',grc=gc('--bdr')||'#E5E7EB';
  const mx=Math.max(...data.map(d=>Math.max(d.r||0,d.o||0)))*1.2;const sc=mx>0?ch/mx:1;
  for(let i=0;i<=4;i++){const y=P.t+(ch/4)*i;svg.appendChild(S('line',{x1:P.l,y1:y,x2:W-P.r,y2:y,stroke:grc,'stroke-dasharray':'4,4'}));const t=S('text',{x:P.l-6,y:y+3,'text-anchor':'end','font-size':'9.5',fill:tc,'font-family':'Inter'});t.textContent='₹'+Math.round(mx*(1-i/4));svg.appendChild(t);}
  const tp=document.createElement('div');tp.className='tp';c.appendChild(tp);
  const bw=Math.min(36,(cw/data.length)*.3);
  data.forEach((d,i)=>{
    const cx2=P.l+(i+.5)*(cw/data.length);
    if(d.r){const bh=d.r*sc;const b=S('rect',{x:cx2-bw-2,y:P.t+ch-bh,width:bw,height:bh,fill:comp.color,rx:4,cursor:'pointer',opacity:'.82'});
      b.addEventListener('mouseenter',()=>{tp.innerHTML=`Revenue: ₹${d.r} Cr`;tp.classList.add('vis');b.setAttribute('opacity','1');});
      b.addEventListener('mousemove',e=>{const r=c.getBoundingClientRect();tp.style.left=(e.clientX-r.left+12)+'px';tp.style.top=(e.clientY-r.top-40)+'px';});
      b.addEventListener('mouseleave',()=>{tp.classList.remove('vis');b.setAttribute('opacity','.82');});svg.appendChild(b);}
    if(d.o){const bh=d.o*sc;const b=S('rect',{x:cx2+2,y:P.t+ch-bh,width:bw,height:bh,fill:'var(--green)',rx:4,cursor:'pointer',opacity:'.6'});
      b.addEventListener('mouseenter',()=>{tp.innerHTML=`Order Book: ₹${d.o} Cr`;tp.classList.add('vis');b.setAttribute('opacity','.85');});
      b.addEventListener('mousemove',e=>{const r=c.getBoundingClientRect();tp.style.left=(e.clientX-r.left+12)+'px';tp.style.top=(e.clientY-r.top-40)+'px';});
      b.addEventListener('mouseleave',()=>{tp.classList.remove('vis');b.setAttribute('opacity','.6');});svg.appendChild(b);}
    const t=S('text',{x:cx2,y:H-10,'text-anchor':'middle','font-size':'9.5',fill:tc,'font-family':'Inter'});t.textContent=d.p;svg.appendChild(t);
  });
  c.insertBefore(svg,tp);
  const lg=document.createElement('div');lg.className='lg';lg.innerHTML=`<div class="li"><div class="ld" style="background:${comp.color}"></div>Revenue</div><div class="li"><div class="ld" style="background:var(--green)"></div>Order Book</div>`;c.appendChild(lg);
}

// ============================== GAUGE ==============================
function rGauges(comp){
  rGauge('g1-'+comp.id,comp.vis,100,comp.color);
  rGauge('g2-'+comp.id,comp.sentS,100,comp.sentS>=80?'var(--green)':comp.sentS>=60?'var(--orange)':'var(--red)');
  rGauge('g3-'+comp.id,comp.gujS,100,comp.gujS>=80?'var(--green)':comp.gujS>=60?'var(--blue)':'var(--orange)');
}
function rGauge(id,v,mx,col){
  const c=document.getElementById(id);if(!c)return;c.innerHTML='';
  const W=90,H=55,cx=45,cy=50,R=38;
  const svg=S('svg',{viewBox:`0 0 ${W} ${H}`,width:W,height:H});
  const trk=`M${cx+R*Math.cos(Math.PI)},${cy+R*Math.sin(Math.PI)} A${R},${R} 0 0,1 ${cx+R},${cy}`;
  svg.appendChild(S('path',{d:trk,fill:'none',stroke:'var(--bdr)','stroke-width':'6','stroke-linecap':'round'}));
  const pct=Math.min(v/mx,1),va=Math.PI-pct*Math.PI;
  const x2=cx+R*Math.cos(va),y2=cy+R*Math.sin(va),la=pct>.5?1:0;
  const vp=`M${cx+R*Math.cos(Math.PI)},${cy+R*Math.sin(Math.PI)} A${R},${R} 0 ${la},1 ${x2},${y2}`;
  svg.appendChild(S('path',{d:vp,fill:'none',stroke:col,'stroke-width':'6','stroke-linecap':'round'}));
  c.appendChild(svg);
}

// ============================== PIPELINE BAR ==============================
function rPipeline(){
  const c=document.getElementById('chPipeline');if(!c)return;c.innerHTML='';
  const cats=['Biofics Surat\n(Current)','Biofics Surat\n(Design)','SMC EOI\nTarget','Grüner\nNavsari','Biofics 11th\nGujarat MoU'];
  const vals=[2,5,5,44,10];const colors=['#F97316','#F97316','#3B82F6','#10B981','#F97316'];
  const labels=['2 TPD','5 TPD','5 TPD','44 TPD','10 TPD'];
  const W=c.clientWidth,H=260,P={t:20,r:20,b:60,l:50},cw=W-P.l-P.r,ch=H-P.t-P.b;
  const svg=S('svg',{viewBox:`0 0 ${W} ${H}`,width:W,height:H});
  const tc=gc('--text3')||'#9CA3AF',grc=gc('--bdr')||'#E5E7EB';
  const mx=50;
  for(let i=0;i<=4;i++){const y=P.t+(ch/4)*i;svg.appendChild(S('line',{x1:P.l,y1:y,x2:W-P.r,y2:y,stroke:grc,'stroke-dasharray':'4,4'}));const t=S('text',{x:P.l-6,y:y+3,'text-anchor':'end','font-size':'9.5',fill:tc,'font-family':'Inter'});t.textContent=Math.round(mx*(1-i/4))+' TPD';svg.appendChild(t);}
  const tp=document.createElement('div');tp.className='tp';c.appendChild(tp);
  const bw=Math.min(44,(cw/cats.length)*.6);
  cats.forEach((cat,i)=>{
    const cx2=P.l+(i+.5)*(cw/cats.length);const bh=(vals[i]/mx)*ch;
    const b=S('rect',{x:cx2-bw/2,y:P.t+ch-bh,width:bw,height:bh,fill:colors[i],rx:5,cursor:'pointer',opacity:'.82'});
    b.addEventListener('mouseenter',()=>{tp.innerHTML=`<strong>${cat.replace('\n',' ')}</strong><br>${labels[i]}`;tp.classList.add('vis');b.setAttribute('opacity','1');});
    b.addEventListener('mousemove',e=>{const r=c.getBoundingClientRect();tp.style.left=(e.clientX-r.left+12)+'px';tp.style.top=(e.clientY-r.top-40)+'px';});
    b.addEventListener('mouseleave',()=>{tp.classList.remove('vis');b.setAttribute('opacity','.82');});
    svg.appendChild(b);
    const vt=S('text',{x:cx2,y:P.t+ch-bh-6,'text-anchor':'middle','font-size':'11','font-weight':'700',fill:colors[i],'font-family':'Inter'});vt.textContent=labels[i];svg.appendChild(vt);
    cat.split('\n').forEach((ln,li)=>{const t=S('text',{x:cx2,y:H-24+li*12,'text-anchor':'middle','font-size':'9',fill:tc,'font-family':'Inter'});t.textContent=ln;svg.appendChild(t);});
  });
  c.insertBefore(svg,tp);
}

// ============================== TABLE SORT ==============================
function srt(tid,ci,tp){
  const t=document.getElementById(tid);if(!t)return;
  const tb=t.querySelector('tbody'),rows=Array.from(tb.querySelectorAll('tr'));
  const th=t.querySelectorAll('thead th')[ci];
  const asc=!th.dataset.dir||th.dataset.dir==='desc';
  t.querySelectorAll('thead th').forEach(h=>h.dataset.dir='');
  th.dataset.dir=asc?'asc':'desc';
  rows.sort((a,b)=>{let va=a.cells[ci].textContent.trim(),vb=b.cells[ci].textContent.trim();
    if(tp==='n'){va=parseFloat(va.replace(/[^0-9.\-]/g,''))||0;vb=parseFloat(vb.replace(/[^0-9.\-]/g,''))||0;}
    return asc?(va>vb?1:va<vb?-1:0):(va<vb?1:va>vb?-1:0);
  });
  rows.forEach(r=>tb.appendChild(r));
}

// ============================== SEARCH ==============================
function doSearch(v){
  const r=document.getElementById('srR');if(!v||v.length<2){r.classList.remove('op');return;}
  v=v.toLowerCase();let h='';
  D.comps.forEach(c=>{
    if(c.name.toLowerCase().includes(v)||c.short.toLowerCase().includes(v))
      h+=`<div class="sr-i" onclick="navigate('${c.id}')"><div class="sr-l">Competitor</div><strong>${c.name}</strong> — Vis: ${c.vis}, Share: ${c.share}%</div>`;
    c.tl.forEach(t=>{if(t.v.toLowerCase().includes(v)||t.m.toLowerCase().includes(v))
      h+=`<div class="sr-i" onclick="navigate('${c.id}')"><div class="sr-l">${c.short} · ${t.m}</div>${t.v}</div>`;});
  });
  D.intel.forEach(f=>{if(f.sig.toLowerCase().includes(v)||f.c.toLowerCase().includes(v))
    h+=`<div class="sr-i" onclick="navigate('intel')"><div class="sr-l">Intel · ${f.c}</div>${f.sig}</div>`;});
  r.innerHTML=h||'<div class="sr-i" style="color:var(--text3)">No results</div>';r.classList.add('op');
}
function clSrch(){document.getElementById('srR').classList.remove('op');}

// ============================== EXPORT ==============================
function expComp(id){
  const c=D.comps.find(x=>x.id===id);if(!c)return;
  let t=c.name+' — Competitive Intelligence Export\n\n';
  c.kpis.forEach(k=>{t+=k.l+': '+k.v+' '+k.d+'\n';});
  t+='\nTimeline:\n';c.tl.forEach(x=>{t+=x.d+' | '+x.m+' | '+x.v+' | '+x.s+'\n';});
  const b=new Blob([t],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=c.id+'_intel.txt';a.click();
}

// ============================== DARK/MOBILE ==============================
function togDark(){document.documentElement.classList.toggle('dark');setTimeout(()=>{const pg=document.querySelector('.pg.on');if(pg)renderChartsFor(pg.id.replace('pg-',''));},80);}

function closeMob(){document.getElementById('sb').classList.remove('mo');document.getElementById('sbOv').classList.remove('vis');}

document.addEventListener('DOMContentLoaded',init);
